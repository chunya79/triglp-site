<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 272" role="img" aria-label="triGLP — 3 pathways in one drop">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;800&amp;display=swap');
    </style>
  </defs>

  <!-- Solid orange filled teardrop — point at top, wide round base -->
  <path d="M 100 14
           C 68 56, 26 96, 26 148
           A 74 74 0 0 0 174 148
           C 174 96, 132 56, 100 14 Z"
        fill="#FE5000"/>

  <!-- White C-curl inside drop — opens to the right -->
  <path d="M 124 107
           C 118 94, 82 94, 76 124
           C 76 154, 112 158, 124 145"
        stroke="white"
        stroke-width="10"
        fill="none"
        stroke-linecap="round"/>

  <!-- triGLP wordmark: tri=light, GLP=black weight -->
  <text x="100" y="242"
        font-family="Poppins, sans-serif"
        text-anchor="middle"
        font-size="40">
    <tspan font-weight="300" fill="#D8D8D8">tri</tspan><tspan font-weight="800" fill="#D8D8D8">GLP</tspan>
  </text>

  <!-- TM superscript -->
  <text x="168" y="222"
        font-family="Poppins, sans-serif"
        font-size="10"
        font-weight="300"
        fill="#D8D8D8">™</text>

  <!-- Tagline -->
  <text x="100" y="264"
        font-family="Poppins, sans-serif"
        text-anchor="middle"
        font-size="13"
        font-weight="400"
        fill="#FE5000"
        letter-spacing="0.3">3 pathways in one drop</text>
</svg>
