[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/order"
  to = "https://embrace-health.orygn.co/"
  status = 302

[[redirects]]
  from = "/join"
  to = "/opportunity.html"
  status = 301
